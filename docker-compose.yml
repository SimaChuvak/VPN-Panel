services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpn_panel}
      POSTGRES_USER: ${POSTGRES_USER:-vpn_panel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [frontend, internal]
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  hostagent:
    build: ./hostagent
    env_file: .env
    networks: [internal]

  frontend:
    build: ./frontend
    networks: [frontend]

  nginx:
    image: nginx:1.27-alpine
    depends_on: [frontend, backend]
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [frontend]

volumes:
  postgres_data:

networks:
  frontend:
  internal:
    internal: true
